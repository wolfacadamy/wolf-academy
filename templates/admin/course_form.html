{% extends "base.html" %}
{% block title %}{{ 'Edit' if course else 'New' }} Course — Wolf Academy{% endblock %}

{% block content %}
<div class="container-narrow">
    <div class="breadcrumb">
        <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
        <span class="sep">›</span>
        <span>{{ 'Edit Course' if course else 'New Course' }}</span>
    </div>

    <h1>{{ '✏️ Edit Course' if course else '📝 New Course' }}</h1>
    <br>

    <form method="POST">
        <div class="form-group">
            <label for="title">Course Title</label>
            <input type="text" id="title" name="title" class="form-control"
                   placeholder="e.g., Workplace Safety Fundamentals"
                   value="{{ course.title if course else '' }}" required>
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" class="form-control"
                      style="min-height:120px;font-family:'Inter',sans-serif;"
                      placeholder="Brief overview of the course content...">{{ course.description if course else '' }}</textarea>
        </div>
        <div style="display:flex;gap:0.75rem;">
            <button type="submit" class="btn btn-primary">
                {{ '💾 Save Changes' if course else '✨ Create Course' }}
            </button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
