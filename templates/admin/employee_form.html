{% extends "base.html" %}
{% block title %}Add Employee — Wolf Academy{% endblock %}

{% block content %}
<div class="container-narrow">
    <div class="breadcrumb">
        <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
        <span class="sep">›</span>
        <a href="{{ url_for('admin_employees') }}">Employees</a>
        <span class="sep">›</span>
        <span>Add Employee</span>
    </div>

    <h1>👤 Add New Employee</h1>
    <br>

    <form method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control"
                   placeholder="e.g., john.doe" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" class="form-control"
                   placeholder="e.g., john@company.com" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control"
                   placeholder="Set initial password" required>
        </div>
        <div style="display:flex;gap:0.75rem;">
            <button type="submit" class="btn btn-primary">✨ Create Employee</button>
            <a href="{{ url_for('admin_employees') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
